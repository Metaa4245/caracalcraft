[package]
name = "caracalcraft"
version = "0.1.0"
edition = "2021"

[dependencies]
cesu8 = "1.1.0"
enumn = "0.1.14"
fastnbt = "2.5.0"
noise = { version = "0.9.0", features = ["std"] }
serde = { version = "1.0.210", features = ["derive"] }
tokio = { version = "1.40.0", features = ["full"] }
tracing = "0.1.40"
tracing-subscriber = "0.3.18"

[profile.release]
strip = true
lto = true
codegen-units = 1

[profile.dev]
debug = true
